[tasks.dev]
description = "Start the frontend Vite dev server"
run = "vite"

[tasks.build]
description = "Build the frontend Worker static assets app"
run = "vite build"

[tasks.preview]
description = "Preview the built frontend app locally"
run = "vite preview"

[tasks.deploy]
description = "Deploy the frontend Worker static assets app"
run = "wrangler deploy"

[tasks.typecheck]
description = "Typecheck the frontend app"
run = "tsc -b ."
