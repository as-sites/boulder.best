[tasks.icons]
alias = ["frontend:icons"]
description = "Generate PNG app icons from public/favicon.svg"
run = "node scripts/generate-icons.ts"

[tasks.dev]
alias = ["frontend:dev"]
description = "Start the frontend Vite dev server"
run = "vite"

[tasks."dev:tunnel"]
alias = ["frontend:dev:tunnel"]
description = "Start Vite for cloudflared dev (allows TUNNEL_HOSTNAME)"
run = "vite --host"
env.TUNNEL_HOSTNAME = "{{ env.TUNNEL_HOSTNAME | default(value='local.boulder.best') }}"

[tasks.build]
alias = ["frontend:build"]
description = "Build the frontend Worker static assets app"
run = "vite build"
env.CLOUDFLARE_ENV = "production"
# Matches the git SHA used as Sentry release in CI (deploy workflow sets GITHUB_SHA).
env.VITE_SENTRY_RELEASE_FRONTEND = "{{ env.GITHUB_SHA | default(value='') }}"
# Source maps are not uploaded during build unless SENTRY_UPLOAD_SOURCEMAPS=1
# (@sentry/vite-plugin). CI uses frontend:sentry:sourcemaps (sentry-cli) instead.

[tasks."sentry:sourcemaps"]
alias = ["frontend:sentry:sourcemaps"]
description = "Upload frontend source maps to Sentry via sentry-cli (no-op without SENTRY_AUTH_TOKEN; used in CI deploy)"
depends = ["build"]
env.VITE_SENTRY_RELEASE_FRONTEND = "{{ env.VITE_SENTRY_RELEASE_FRONTEND | default(value=env.GITHUB_SHA | default(value='')) }}"
run = [
  '[ -n "${SENTRY_AUTH_TOKEN:-}" ] || exit 0',
  ': "${SENTRY_ORG:?SENTRY_ORG is required}"',
  ': "${SENTRY_PROJECT_FRONTEND:?SENTRY_PROJECT_FRONTEND is required}"',
  ': "${VITE_SENTRY_RELEASE_FRONTEND:?VITE_SENTRY_RELEASE_FRONTEND is required}"',
  'test -d dist/assets || { echo "dist/assets/ missing — run frontend:build first" >&2; exit 1; }',
  'sentry-cli releases new "$VITE_SENTRY_RELEASE_FRONTEND" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_FRONTEND" || true',
  'sentry-cli sourcemaps upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_FRONTEND" --release "$VITE_SENTRY_RELEASE_FRONTEND" dist/assets',
]
run_windows = [
  "if not defined SENTRY_AUTH_TOKEN exit /b 0",
  "if not defined SENTRY_ORG (echo SENTRY_ORG is required 1>&2 & exit /b 1)",
  "if not defined SENTRY_PROJECT_FRONTEND (echo SENTRY_PROJECT_FRONTEND is required 1>&2 & exit /b 1)",
  "if not defined VITE_SENTRY_RELEASE_FRONTEND (echo VITE_SENTRY_RELEASE_FRONTEND is required 1>&2 & exit /b 1)",
  "if not exist dist\\assets (echo dist/assets/ missing - run frontend:build first 1>&2 & exit /b 1)",
  "sentry-cli releases new %VITE_SENTRY_RELEASE_FRONTEND% --org %SENTRY_ORG% --project %SENTRY_PROJECT_FRONTEND% || exit /b 0",
  "sentry-cli sourcemaps upload --org %SENTRY_ORG% --project %SENTRY_PROJECT_FRONTEND% --release %VITE_SENTRY_RELEASE_FRONTEND% dist/assets",
]

[tasks.preview]
alias = ["frontend:preview"]
description = "Preview the built frontend app locally"
run = "vite preview"

[tasks."preview:upload"]
alias = ["frontend:preview:upload"]
description = "Upload a preview frontend Worker version (PREVIEW_ALIAS; same-origin API via gateway)"
depends = ["build"]
run = '''
: "${PREVIEW_ALIAS:?PREVIEW_ALIAS is required}"
wrangler versions upload --preview-alias "$PREVIEW_ALIAS"
'''

[tasks.deploy]
alias = ["frontend:deploy"]
description = "Deploy the frontend Worker static assets app"
depends = ["build"]
run = "wrangler deploy"

[tasks."deploy:dry-run"]
alias = ["frontend:deploy:dry-run"]
description = "Validate the frontend Worker static assets deployment without deploying"
depends = ["build"]
run = "wrangler deploy --dry-run --outdir .wrangler/deploy-dry-run"

[tasks.typecheck]
alias = ["frontend:typecheck"]
description = "Typecheck the frontend app"
run = "tsc -b ."
