[tasks.dev]
alias = ["frontend:dev"]
description = "Start the frontend Vite dev server"
run = "vite"

[tasks.build]
alias = ["frontend:build"]
description = "Build the frontend Worker static assets app"
run = "vite build"
env.CLOUDFLARE_ENV = "production"

[tasks.preview]
alias = ["frontend:preview"]
description = "Preview the built frontend app locally"
run = "vite preview"

[tasks.deploy]
alias = ["frontend:deploy"]
description = "Deploy the frontend Worker static assets app"
depends = ["build"]
run = "wrangler deploy"

[tasks."deploy:dry-run"]
alias = ["frontend:deploy:dry-run"]
description = "Validate the frontend Worker static assets deployment without deploying"
depends = ["build"]
run = "wrangler deploy --dry-run --outdir .wrangler/deploy-dry-run"

[tasks.typecheck]
alias = ["frontend:typecheck"]
description = "Typecheck the frontend app"
run = "tsc -b ."
