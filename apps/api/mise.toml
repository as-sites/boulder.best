[tasks.dev]
alias = ["api:dev"]
description = "Start the API Worker dev server"
usage = '''
flag "-e --env <ENV>" help="The environment to start the dev server in" default="dev" {
  choices "dev" "tunnel" "production"
}
'''
run = "wrangler dev --env {{usage.env}}"
env.FORCE_COLOR = "1'"


[tasks.build]
alias = ["api:build"]
description = "Bundle the API Worker without deploying"
run = "wrangler deploy --env production --dry-run --outdir dist"

[tasks.deploy]
alias = ["api:deploy"]
description = "Deploy the API Worker"
run = 'wrangler deploy --env production --outdir dist --var "SENTRY_RELEASE_API:{{ env.SENTRY_RELEASE_API | default(value=env.GITHUB_SHA | default(value="")) }}"'

[tasks."sentry:sourcemaps"]
alias = ["api:sentry:sourcemaps"]
description = "Upload API Worker source maps to Sentry (no-op without SENTRY_AUTH_TOKEN)"
env.SENTRY_RELEASE_API = "{{ env.SENTRY_RELEASE_API | default(value=env.GITHUB_SHA | default(value='')) }}"
run = [
  '[ -n "${SENTRY_AUTH_TOKEN:-}" ] || exit 0',
  ': "${SENTRY_ORG:?SENTRY_ORG is required}"',
  ': "${SENTRY_PROJECT_API:?SENTRY_PROJECT_API is required}"',
  ': "${SENTRY_RELEASE_API:?SENTRY_RELEASE_API is required}"',
  'test -d dist || { echo "dist/ missing — run api:deploy first" >&2; exit 1; }',
  'sentry-cli releases new "$SENTRY_RELEASE_API" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_API" || true',
  'sentry-cli sourcemaps upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_API" --release "$SENTRY_RELEASE_API" dist',
]
run_windows = [
  "if not defined SENTRY_AUTH_TOKEN exit /b 0",
  "if not defined SENTRY_ORG (echo SENTRY_ORG is required 1>&2 & exit /b 1)",
  "if not defined SENTRY_PROJECT_API (echo SENTRY_PROJECT_API is required 1>&2 & exit /b 1)",
  "if not defined SENTRY_RELEASE_API (echo SENTRY_RELEASE_API is required 1>&2 & exit /b 1)",
  "if not exist dist (echo dist/ missing - run api:deploy first 1>&2 & exit /b 1)",
  "sentry-cli releases new %SENTRY_RELEASE_API% --org %SENTRY_ORG% --project %SENTRY_PROJECT_API || exit /b 0",
  "sentry-cli sourcemaps upload --org %SENTRY_ORG% --project %SENTRY_PROJECT_API --release %SENTRY_RELEASE_API% dist",
]

[tasks.typecheck]
description = "Typecheck the API Worker"
run = "tsc -b ."

[tasks."db:generate"]
alias = ["api:db:generate"]
description = "Generate SQL migration files from schema changes"
run = "drizzle-kit generate"

[tasks."db:migrate"]
alias = ["api:db:migrate"]
description = "Apply pending migrations to the database"
run = "drizzle-kit migrate"

[tasks."db:push"]
alias = ["api:db:push"]
description = "Push schema directly to DB without migration files (dev only)"
run = "drizzle-kit push"

[tasks."db:check"]
alias = ["api:db:check"]
description = "Check migration files are consistent with the schema"
run = "drizzle-kit check"

[tasks."db:studio"]
alias = ["api:db:studio"]
description = "Open Drizzle Studio to browse the database"
run = "drizzle-kit studio"
[tasks."deploy:dry-run"]
alias = ["api:deploy:dry-run"]
description = "Validate wrangler config for the production Worker without deploying"
run = "wrangler deploy --env production --dry-run --outdir dist"

[tasks."r2:cors:apply"]
alias = ["api:r2:cors:apply"]
description = "Apply CORS rules from r2-cors.json to the R2 bucket"
run = "wrangler r2 bucket cors set boulder-dot-best --file r2-cors.json --force"

[tasks."r2:cors:list"]
alias = ["api:r2:cors:list"]
description = "List current CORS rules for the R2 bucket"
run = "wrangler r2 bucket cors list boulder-dot-best"

[tasks."r2:domain:add"]
alias = ["api:r2:domain:add"]
description = "Connect cdn.boulder.best to the production R2 bucket (requires CLOUDFLARE_ZONE_ID)"
run = '''
: "${CLOUDFLARE_ZONE_ID:?CLOUDFLARE_ZONE_ID is required (zone overview for boulder.best)}"
wrangler r2 bucket domain add boulder-dot-best --domain cdn.boulder.best --zone-id "$CLOUDFLARE_ZONE_ID" --force
'''
run_windows = [
  "if not defined CLOUDFLARE_ZONE_ID (echo CLOUDFLARE_ZONE_ID is required (zone overview for boulder.best) 1>&2 & exit /b 1)",
  "wrangler r2 bucket domain add boulder-dot-best --domain cdn.boulder.best --zone-id %CLOUDFLARE_ZONE_ID% --force",
]

[tasks."r2:domain:ensure"]
alias = ["api:r2:domain:ensure"]
description = "Idempotently connect cdn.boulder.best (requires CLOUDFLARE_ZONE_ID)"
run = '''
: "${CLOUDFLARE_ZONE_ID:?CLOUDFLARE_ZONE_ID is required (zone overview for boulder.best)}"
if wrangler r2 bucket domain get boulder-dot-best --domain cdn.boulder.best >/dev/null 2>&1; then
  echo "Custom domain cdn.boulder.best already connected to boulder-dot-best"
else
  wrangler r2 bucket domain add boulder-dot-best --domain cdn.boulder.best --zone-id "$CLOUDFLARE_ZONE_ID" --force
fi
'''
run_windows = [
  "if not defined CLOUDFLARE_ZONE_ID (echo CLOUDFLARE_ZONE_ID is required (zone overview for boulder.best) 1>&2 & exit /b 1)",
  "wrangler r2 bucket domain get boulder-dot-best --domain cdn.boulder.best >nul 2>&1",
  "if errorlevel 1 (wrangler r2 bucket domain add boulder-dot-best --domain cdn.boulder.best --zone-id %CLOUDFLARE_ZONE_ID% --force) else (echo Custom domain cdn.boulder.best already connected to boulder-dot-best)",
]

[tasks."r2:domain:list"]
alias = ["api:r2:domain:list"]
description = "List custom domains connected to the production R2 bucket"
run = "wrangler r2 bucket domain list boulder-dot-best"

[tasks."r2:sync"]
alias = ["api:r2:sync"]
description = "Apply R2 public domain (idempotent) and CORS rules from repo config"
depends = ["r2:domain:ensure", "r2:cors:apply"]

[tasks."auth:generate-schema"]
alias = ["api:auth:generate-schema"]
description = "Regenerate better-auth Drizzle schema (re-run after adding plugins)"
run = "pnpm dlx @better-auth/cli generate --output ../../packages/auth/src/schema.ts"

[tasks."preview:upload"]
alias = ["api:preview:upload"]
description = "Upload a preview API Worker version (PREVIEW_ALIAS, PREVIEW_ORIGIN, PREVIEW_SECRETS_FILE)"
depends = ["build"]
run = '''
: "${PREVIEW_ALIAS:?PREVIEW_ALIAS is required}"
: "${PREVIEW_ORIGIN:?PREVIEW_ORIGIN is required}"
: "${PREVIEW_SECRETS_FILE:?PREVIEW_SECRETS_FILE is required}"
wrangler versions upload --env production --outdir dist \
  --preview-alias "$PREVIEW_ALIAS" \
  --secrets-file "$PREVIEW_SECRETS_FILE" \
  --keep-vars \
  --var "BETTER_AUTH_URL:$PREVIEW_ORIGIN" \
  --var "FRONTEND_URL:$PREVIEW_ORIGIN" \
  --var "PASSKEY_ORIGIN:$PREVIEW_ORIGIN" \
  --var "PASSKEY_RP_ID:boulder.best" \
  --var "SENTRY_RELEASE_API:${SENTRY_RELEASE_API:-${GITHUB_SHA:-}}"
'''
