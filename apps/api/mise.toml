[tasks.dev]
alias = ["api:dev"]
description = "Start the API Worker dev server"
run = "wrangler dev --env dev"

[tasks.build]
alias = ["api:build"]
description = "Bundle the API Worker without deploying"
run = "wrangler build --env production"

[tasks.deploy]
alias = ["api:deploy"]
description = "Deploy the API Worker"
run = "wrangler deploy --env production"

[tasks.typecheck]
description = "Typecheck the API Worker"
run = "tsc -b ."

[tasks."db:generate"]
alias = ["api:db:generate"]
description = "Generate SQL migration files from schema changes"
run = "drizzle-kit generate"

[tasks."db:migrate"]
alias = ["api:db:migrate"]
description = "Apply pending migrations to the database"
run = "drizzle-kit migrate"

[tasks."db:push"]
alias = ["api:db:push"]
description = "Push schema directly to DB without migration files (dev only)"
run = "drizzle-kit push"

[tasks."db:check"]
alias = ["api:db:check"]
description = "Check migration files are consistent with the schema"
run = "drizzle-kit check"

[tasks."db:studio"]
alias = ["api:db:studio"]
description = "Open Drizzle Studio to browse the database"
run = "drizzle-kit studio"
[tasks."deploy:dry-run"]
alias = ["api:deploy:dry-run"]
description = "Validate wrangler config for the production Worker without deploying"
run = "wrangler deploy --env production --dry-run --outdir dist"

[tasks."r2:cors:apply"]
alias = ["api:r2:cors:apply"]
description = "Apply CORS rules from r2-cors.json to the R2 bucket"
run = "wrangler r2 bucket cors set boulder-dot-best --file r2-cors.json --force"

[tasks."r2:cors:list"]
alias = ["api:r2:cors:list"]
description = "List current CORS rules for the R2 bucket"
run = "wrangler r2 bucket cors list boulder-dot-best"

[tasks."r2:domain:add"]
alias = ["api:r2:domain:add"]
description = "Connect cdn.boulder.best to the production R2 bucket (requires CLOUDFLARE_ZONE_ID)"
run = '''
: "${CLOUDFLARE_ZONE_ID:?CLOUDFLARE_ZONE_ID is required (zone overview for boulder.best)}"
wrangler r2 bucket domain add boulder-dot-best --domain cdn.boulder.best --zone-id "$CLOUDFLARE_ZONE_ID" --force
'''
# Shebangs spawn a new console on Windows (popup). -File runs in the current terminal.
run_windows = "powershell -NoProfile -NonInteractive -File scripts/r2-domain-add.ps1"

[tasks."r2:domain:ensure"]
alias = ["api:r2:domain:ensure"]
description = "Idempotently connect cdn.boulder.best (requires CLOUDFLARE_ZONE_ID)"
run = '''
: "${CLOUDFLARE_ZONE_ID:?CLOUDFLARE_ZONE_ID is required (zone overview for boulder.best)}"
if wrangler r2 bucket domain get boulder-dot-best --domain cdn.boulder.best >/dev/null 2>&1; then
  echo "Custom domain cdn.boulder.best already connected to boulder-dot-best"
else
  wrangler r2 bucket domain add boulder-dot-best --domain cdn.boulder.best --zone-id "$CLOUDFLARE_ZONE_ID" --force
fi
'''
run_windows = "powershell -NoProfile -NonInteractive -File scripts/r2-domain-ensure.ps1"

[tasks."r2:domain:list"]
alias = ["api:r2:domain:list"]
description = "List custom domains connected to the production R2 bucket"
run = "wrangler r2 bucket domain list boulder-dot-best"

[tasks."r2:sync"]
alias = ["api:r2:sync"]
description = "Apply R2 public domain (idempotent) and CORS rules from repo config"
depends = ["r2:domain:ensure", "r2:cors:apply"]

[tasks."auth:generate-schema"]
alias = ["api:auth:generate-schema"]
description = "Regenerate better-auth Drizzle schema (re-run after adding plugins)"
run = "pnpm dlx @better-auth/cli generate --output ../../packages/auth/src/schema.ts"
