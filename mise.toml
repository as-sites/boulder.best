min_version = "2026.5.0"
experimental_monorepo_root = true

# Redact sensitive values from `mise run` output (see https://mise.jdx.dev/environments/#redactions).
redactions = [
  "DATABASE_URL",
  "R2_ACCESS_KEY_ID",
  "R2_SECRET_ACCESS_KEY",
  "GOOGLE_CLIENT_ID",
  "GOOGLE_CLIENT_SECRET",
  "DISCORD_CLIENT_ID",
  "DISCORD_CLIENT_SECRET",
  "RESEND_API_KEY",
  "VITE_SENTRY_DSN_FRONTEND",
  "SENTRY_DSN_API",
  "SENTRY_AUTH_TOKEN",
  "LOCAL_CLOUDFLARE_API_TOKEN",
  "CLOUDFLARE_MASTER_TOKEN",
  "*_SECRET",
  "*_TOKEN",
  "*_DSN",
]

[settings]
experimental = true
task_output = "quiet"

[tools]
node = "24.15.0"
pnpm = "11.2.1"
# Graphite stacked PRs (`gt` via mise tool alias)
gt = "1.8.6"
# this is needed for tab completions of mise tasks and some other binaries
usage = "3.3.0"
hk = "1.45.0"
pkl = "0.31.1"
wrangler = "4.94.0"

[tool_alias]
gt = "npm:@withgraphite/graphite-cli"

[monorepo]
config_roots = ["apps/*", "packages/*"]

# this doesn't use the builtin pnpm provider because it doesn't allow overriding `sources`
[deps.pnpm-custom]
auto = true
sources = [
  "package.json",
  "apps/*/package.json",
  "packages/*/package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]
outputs = ["node_modules/"]
description = "Install dependencies with pnpm"
run = 'pnpm install'

[env]
HK_MISE = "1"
HK_HIDE_WHEN_DONE = "true"
MISE_EXPERIMENTAL = "1"
_.file = { path = ".env", redact = true }
_.path = [
  "{{config_root}}/node_modules/.bin",
  "{{config_root}}/apps/frontend/node_modules/.bin",
  "{{config_root}}/apps/api/node_modules/.bin",
]

[hooks]
postinstall = ["hk install --mise"]

[shell_alias]
mr = 'mise tasks run '
mi = 'mise install '

[tasks.lint]
quiet = true
alias = "lint"
description = "Lint the entire repo"
usage = '''
arg "[paths]" var=#true help="The paths to lint" default="."

flag "-f --fix" help="Apply safe fixes"
flag "--fix-suggestions" help="Apply auto-fixable suggestions. May change program behaviour"
flag "--fix-dangerously" help="Apply dangerous fixes and suggestions"
flag "-q --quiet" help="Run in quiet mode, which only outputs errors"
flag "--format <FORMAT>" help="The format to output the results in" default="stylish" {
  choices "checkstyle" "default" "github" "gitlab" "json" "junit" "stylish" "unix"
}
'''

# in oxlint, the `--allow all` means to suppress the lint for all rules,
# and the `--deny <rule>` means to emit an error for that rule
run = 'oxlint --config=./oxlint.config.ts --format={{usage.format}} {% if usage.fix %}--fix {% endif %}{% if usage.fix_suggestions %}--fix-suggestions {% endif %}{% if usage.fix_dangerously %}--fix-dangerously {% endif %}{% if usage.quiet %}--quiet {% endif %}{% for path in usage.paths %}{{path}} {% endfor %}'

[tasks.format]
description = "Format the entire repo"
usage = '''
arg "[paths]" var=#true help="The paths to lint" default="."

flag "-c --check" help="Check if the files are formatted"
flag "-l --list-different" help="List files that are different from the expected format"
'''
alias = ["fmt", "format"]
run = 'oxfmt {% if usage.check %}--check {% endif %} {% if usage.list_different %}--list-different {% endif %} {% for path in usage.paths %}{{path}} {% endfor %}'

[tasks.unit]
alias = ["test:unit", "test"]
description = "Run Vitest for this workspace"
usage = '''
arg "[filters]" var=#true help="Test file filters"

flag "-w --watch" negate="--no-watch" help="Re-run tests when files change" default="false"
flag "--coverage" negate="--no-coverage" help="Collect coverage" default="false"
flag "-p --project <name>" help="Vitest project to run"
flag "-u --update" help="Update snapshots"
flag "--ui" help="Enable Vitest UI"
flag "--open" help="Open Vitest UI automatically"
'''

run = 'vitest run --root="." --config="vitest.config.ts" {% if usage.project %} --project="{{usage.project}}" {% endif %} {% if usage.coverage %} --coverage {% endif %} {% if usage.watch %} --watch {% endif %} {% if usage.update %}--update {% endif %} {% if usage.ui %}--ui {% endif %} {% if usage.open %}--open {% endif %} {% for f in usage.filters %}{{f}} {% endfor %}'

[tasks.dev]
alias = 'dev'
description = "Start the frontend and API dev servers"
depends = ["//apps/api:dev", "//apps/frontend:dev"]

[tasks.typecheck]
alias = 'tsc'
description = "Typecheck all workspace projects"
run = "tsc -b"

[tasks.build]
alias = 'build'
description = "Build all workspace projects"
depends = ["//...:build"]

[tasks.checks]
alias = 'checks'
description = "Run all checks for the workspace"
depends = ["lint", "format", "typecheck"]

# Sync repo root `.env` to GitHub Actions and the production API Worker.
# GitHub: CLOUDFLARE_* (incl. CLOUDFLARE_ZONE_ID for R2 custom domain), DATABASE_URL, Sentry (both DSNs).
# Worker: DATABASE_URL, auth/OAuth, R2 keys, SENTRY_DSN_API (secrets:sync:cloudflare).
# Requires `gh auth login` (github) and `wrangler` auth via LOCAL_CLOUDFLARE_API_TOKEN or `wrangler login` (cloudflare).

[tasks."secrets:sync"]
description = "Push .env to GitHub Actions (incl. CLOUDFLARE_ZONE_ID) and production API Worker secrets"
depends = ["secrets:sync:github", "secrets:sync:cloudflare"]

[tasks."secrets:sync:github"]
description = "Push GitHub Actions secrets from .env (LOCAL_CLOUDFLARE_API_TOKEN → CLOUDFLARE_API_TOKEN in GH, plus account/zone/DB/Sentry)"
run = [
  ': "${LOCAL_CLOUDFLARE_API_TOKEN:?LOCAL_CLOUDFLARE_API_TOKEN is not set}"',
  ': "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is not set}"',
  ': "${CLOUDFLARE_ZONE_ID:?CLOUDFLARE_ZONE_ID is not set}"',
  ': "${DATABASE_URL:?DATABASE_URL is not set}"',
  ': "${VITE_SENTRY_DSN_FRONTEND:?VITE_SENTRY_DSN_FRONTEND is not set}"',
  ': "${SENTRY_AUTH_TOKEN:?SENTRY_AUTH_TOKEN is not set}"',
  ': "${SENTRY_ORG:?SENTRY_ORG is not set}"',
  ': "${SENTRY_PROJECT_FRONTEND:?SENTRY_PROJECT_FRONTEND is not set}"',
  ': "${SENTRY_PROJECT_API:?SENTRY_PROJECT_API is not set}"',
  ': "${SENTRY_DSN_API:?SENTRY_DSN_API is not set}"',
  'gh secret set CLOUDFLARE_API_TOKEN --body "$LOCAL_CLOUDFLARE_API_TOKEN"',
  'gh secret set CLOUDFLARE_ACCOUNT_ID --body "$CLOUDFLARE_ACCOUNT_ID"',
  'gh secret set CLOUDFLARE_ZONE_ID --body "$CLOUDFLARE_ZONE_ID"',
  'gh secret set DATABASE_URL --body "$DATABASE_URL"',
  'gh secret set VITE_SENTRY_DSN_FRONTEND --body "$VITE_SENTRY_DSN_FRONTEND"',
  'gh secret set SENTRY_AUTH_TOKEN --body "$SENTRY_AUTH_TOKEN"',
  'gh secret set SENTRY_ORG --body "$SENTRY_ORG"',
  'gh secret set SENTRY_PROJECT_FRONTEND --body "$SENTRY_PROJECT_FRONTEND"',
  'gh secret set SENTRY_PROJECT_API --body "$SENTRY_PROJECT_API"',
  'gh secret set SENTRY_DSN_API --body "$SENTRY_DSN_API"',
]
run_windows = [
  "if not defined LOCAL_CLOUDFLARE_API_TOKEN (echo LOCAL_CLOUDFLARE_API_TOKEN is not set 1>&2 & exit /b 1)",
  "if not defined CLOUDFLARE_ACCOUNT_ID (echo CLOUDFLARE_ACCOUNT_ID is not set 1>&2 & exit /b 1)",
  "if not defined CLOUDFLARE_ZONE_ID (echo CLOUDFLARE_ZONE_ID is not set 1>&2 & exit /b 1)",
  "if not defined DATABASE_URL (echo DATABASE_URL is not set 1>&2 & exit /b 1)",
  "if not defined VITE_SENTRY_DSN_FRONTEND (echo VITE_SENTRY_DSN_FRONTEND is not set 1>&2 & exit /b 1)",
  "if not defined SENTRY_AUTH_TOKEN (echo SENTRY_AUTH_TOKEN is not set 1>&2 & exit /b 1)",
  "if not defined SENTRY_ORG (echo SENTRY_ORG is not set 1>&2 & exit /b 1)",
  "if not defined SENTRY_PROJECT_FRONTEND (echo SENTRY_PROJECT_FRONTEND is not set 1>&2 & exit /b 1)",
  "if not defined SENTRY_PROJECT_API (echo SENTRY_PROJECT_API is not set 1>&2 & exit /b 1)",
  "if not defined SENTRY_DSN_API (echo SENTRY_DSN_API is not set 1>&2 & exit /b 1)",
  'gh secret set CLOUDFLARE_API_TOKEN --body "%LOCAL_CLOUDFLARE_API_TOKEN%"',
  'gh secret set CLOUDFLARE_ACCOUNT_ID --body "%CLOUDFLARE_ACCOUNT_ID%"',
  'gh secret set CLOUDFLARE_ZONE_ID --body "%CLOUDFLARE_ZONE_ID%"',
  'gh secret set DATABASE_URL --body "%DATABASE_URL%"',
  'gh secret set VITE_SENTRY_DSN_FRONTEND --body "%VITE_SENTRY_DSN_FRONTEND%"',
  'gh secret set SENTRY_AUTH_TOKEN --body "%SENTRY_AUTH_TOKEN%"',
  'gh secret set SENTRY_ORG --body "%SENTRY_ORG%"',
  'gh secret set SENTRY_PROJECT_FRONTEND --body "%SENTRY_PROJECT_FRONTEND%"',
  'gh secret set SENTRY_PROJECT_API --body "%SENTRY_PROJECT_API%"',
  'gh secret set SENTRY_DSN_API --body "%SENTRY_DSN_API%"',
]

# Create a scoped API token for wrangler deploy, R2 sync, and secrets:sync:github.
# Requires CLOUDFLARE_MASTER_TOKEN in .env.secret (account-owned cfat_* token that can create tokens).
# Requires CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_ZONE_ID in .env.
# @see https://developers.cloudflare.com/fundamentals/api/how-to/create-via-api/

[tasks."cloudflare:token:create"]
description = "Create LOCAL_CLOUDFLARE_API_TOKEN via API (CLOUDFLARE_MASTER_TOKEN in .env.secret)"
run = 'node scripts/cloudflare-create-api-token.ts'
env.'_'.file = { path = ".env.secret", redact = true }

[tasks."secrets:sync:cloudflare"]
description = "Push production API Worker secrets to Cloudflare from .env (requires wrangler)"
dir = "apps/api"
run = [
  ': "${DATABASE_URL:?DATABASE_URL is not set}"',
  ': "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is not set}"',
  ': "${R2_ACCOUNT_ID:?R2_ACCOUNT_ID is not set}"',
  ': "${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is not set}"',
  ': "${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is not set}"',
  ': "${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is not set}"',
  ': "${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is not set}"',
  ': "${RESEND_API_KEY:?RESEND_API_KEY is not set}"',
  ': "${DISCORD_CLIENT_ID:?DISCORD_CLIENT_ID is not set}"',
  ': "${DISCORD_CLIENT_SECRET:?DISCORD_CLIENT_SECRET is not set}"',
  ': "${SENTRY_DSN_API:?SENTRY_DSN_API is not set}"',
  'printf %s "$DATABASE_URL" | wrangler secret put DATABASE_URL --env production',
  'printf %s "$BETTER_AUTH_SECRET" | wrangler secret put BETTER_AUTH_SECRET --env production',
  'printf %s "$R2_ACCOUNT_ID" | wrangler secret put R2_ACCOUNT_ID --env production',
  'printf %s "$R2_ACCESS_KEY_ID" | wrangler secret put R2_ACCESS_KEY_ID --env production',
  'printf %s "$R2_SECRET_ACCESS_KEY" | wrangler secret put R2_SECRET_ACCESS_KEY --env production',
  'printf %s "$GOOGLE_CLIENT_ID" | wrangler secret put GOOGLE_CLIENT_ID --env production',
  'printf %s "$GOOGLE_CLIENT_SECRET" | wrangler secret put GOOGLE_CLIENT_SECRET --env production',
  'printf %s "$RESEND_API_KEY" | wrangler secret put RESEND_API_KEY --env production',
  'printf %s "$DISCORD_CLIENT_ID" | wrangler secret put DISCORD_CLIENT_ID --env production',
  'printf %s "$DISCORD_CLIENT_SECRET" | wrangler secret put DISCORD_CLIENT_SECRET --env production',
  'printf %s "$SENTRY_DSN_API" | wrangler secret put SENTRY_DSN_API --env production',
]
run_windows = [
  "if not defined DATABASE_URL (echo DATABASE_URL is not set 1>&2 & exit /b 1)",
  "if not defined BETTER_AUTH_SECRET (echo BETTER_AUTH_SECRET is not set 1>&2 & exit /b 1)",
  "if not defined R2_ACCOUNT_ID (echo R2_ACCOUNT_ID is not set 1>&2 & exit /b 1)",
  "if not defined R2_ACCESS_KEY_ID (echo R2_ACCESS_KEY_ID is not set 1>&2 & exit /b 1)",
  "if not defined R2_SECRET_ACCESS_KEY (echo R2_SECRET_ACCESS_KEY is not set 1>&2 & exit /b 1)",
  "if not defined GOOGLE_CLIENT_ID (echo GOOGLE_CLIENT_ID is not set 1>&2 & exit /b 1)",
  "if not defined GOOGLE_CLIENT_SECRET (echo GOOGLE_CLIENT_SECRET is not set 1>&2 & exit /b 1)",
  "if not defined RESEND_API_KEY (echo RESEND_API_KEY is not set 1>&2 & exit /b 1)",
  "if not defined DISCORD_CLIENT_ID (echo DISCORD_CLIENT_ID is not set 1>&2 & exit /b 1)",
  "if not defined DISCORD_CLIENT_SECRET (echo DISCORD_CLIENT_SECRET is not set 1>&2 & exit /b 1)",
  "if not defined SENTRY_DSN_API (echo SENTRY_DSN_API is not set 1>&2 & exit /b 1)",
  'powershell -NoProfile -Command "$env:DATABASE_URL | wrangler secret put DATABASE_URL --env production"',
  'powershell -NoProfile -Command "$env:BETTER_AUTH_SECRET | wrangler secret put BETTER_AUTH_SECRET --env production"',
  'powershell -NoProfile -Command "$env:R2_ACCOUNT_ID | wrangler secret put R2_ACCOUNT_ID --env production"',
  'powershell -NoProfile -Command "$env:R2_ACCESS_KEY_ID | wrangler secret put R2_ACCESS_KEY_ID --env production"',
  'powershell -NoProfile -Command "$env:R2_SECRET_ACCESS_KEY | wrangler secret put R2_SECRET_ACCESS_KEY --env production"',
  'powershell -NoProfile -Command "$env:GOOGLE_CLIENT_ID | wrangler secret put GOOGLE_CLIENT_ID --env production"',
  'powershell -NoProfile -Command "$env:GOOGLE_CLIENT_SECRET | wrangler secret put GOOGLE_CLIENT_SECRET --env production"',
  'powershell -NoProfile -Command "$env:RESEND_API_KEY | wrangler secret put RESEND_API_KEY --env production"',
  'powershell -NoProfile -Command "$env:DISCORD_CLIENT_ID | wrangler secret put DISCORD_CLIENT_ID --env production"',
  'powershell -NoProfile -Command "$env:DISCORD_CLIENT_SECRET | wrangler secret put DISCORD_CLIENT_SECRET --env production"',
  'powershell -NoProfile -Command "$env:SENTRY_DSN_API | wrangler secret put SENTRY_DSN_API --env production"',
]


[tasks.wrangler-whois-token]
description = "Verify the LOCAL_CLOUDFLARE_API_TOKEN is valid"
env.CLOUDFLARE_API_TOKEN = "{{ env.LOCAL_CLOUDFLARE_API_TOKEN }}"
run = 'wrangler whoami'
