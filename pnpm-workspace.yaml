packages:
  - 'apps/*'
  - 'packages/*'

catalog:
  react: 19.2.6
  react-dom: 19.2.6
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@types/node': 24.12.3
  zod: 4.4.3

catalogs:
  vitest:
    vitest: &vitest_version 4.1.6
    '@vitest/ui': *vitest_version
    '@vitest/coverage-v8': *vitest_version
  better-auth:
    better-auth: &better_auth_version 1.6.10
    '@better-auth/passkey': *better_auth_version
    '@better-auth/core': *better_auth_version

autoInstallPeers: false
peerDependencyRules:
  ignoreMissing:
    - react
    - react-dom
    - react-native

saveExact: true

sideEffectsCache: false
blockExoticSubdeps: true
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
