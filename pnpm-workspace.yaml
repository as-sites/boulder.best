packages:
  - 'apps/*'
  - 'packages/*'

catalog:
  react: 19.2.6
  react-dom: 19.2.6
  '@types/react': 19.2.15
  '@types/react-dom': 19.2.3
  '@types/node': 24.12.3
  zod: 4.4.3
  hono: 4.12.21

catalogs:
  vitest:
    vitest: &vitest_version 4.1.7
    '@vitest/ui': *vitest_version
    '@vitest/coverage-v8': *vitest_version
  better-auth:
    better-auth: &better_auth_version 1.6.11
    '@better-auth/passkey': *better_auth_version
    '@better-auth/core': *better_auth_version
  mantine:
    '@mantine/core': &mantine_version 9.2.1
    '@mantine/hooks': *mantine_version

autoInstallPeers: false
peerDependencyRules:
  ignoreMissing:
    - react
    - react-dom
    - react-native

saveExact: true

sideEffectsCache: false
blockExoticSubdeps: true
allowBuilds:
  '@sentry/cli': true
  esbuild: true
  sharp: true
  workerd: true
