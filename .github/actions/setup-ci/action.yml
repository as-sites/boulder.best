name: 'Setup CI'
description: 'Setup CI environment'

inputs:
  install-dependencies:
    required: false
    description: 'Install dependencies'
    default: 'true'
  setup-mise:
    required: false
    description: 'Setup Mise'
    default: 'true'

runs:
  using: composite
  steps:
    # this is only used to cache node modules for pnpm. we don't use it to install node, since that is handled by mise.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      if: inputs.install-dependencies == 'true'
      with:
        cache: 'pnpm'

    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      if: inputs.setup-mise == 'true'
