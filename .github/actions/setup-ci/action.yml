name: 'Setup CI'
description: 'Setup CI environment'

inputs:
  install-dependencies:
    required: false
    description: 'Install dependencies'
    default: 'true'
  setup-mise:
    required: false
    description: 'Setup Mise'
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      if: inputs.setup-mise == 'true'
    # setup-node only caches npm/yarn/pnpm. Cache aube's global content store instead
    # (same idea as pnpm store caching — aube ci still rebuilds node_modules each run).
    - name: Cache aube store
      uses: actions/cache@5a3ec84b7352072750a6594b6c81fe0123b67324 # v4.2.3
      if: inputs.install-dependencies == 'true'
      with:
        path: |
          ~/.local/share/aube/store
          ~/.cache/aube
        key: aube-${{ runner.os }}-${{ hashFiles('aube-lock.yaml', 'aube-workspace.yaml') }}
        restore-keys: |
          aube-${{ runner.os }}-
    - name: Install dependencies
      shell: bash
      if: inputs.install-dependencies == 'true'
      run: aube ci
