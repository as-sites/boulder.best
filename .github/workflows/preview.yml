# Deploy and clean up PR preview environments.
#
# Triggered directly on pull_request so previews appear under Checks and the
# deployment shows on the PR page via the `environment:` key.
#
# On open / push: create Neon branch, run migrations, upload Worker preview
#   versions with alias pr-<n>. Preview URL visible via the GitHub deployment.
# On close: delete the Neon branch.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with Workers Scripts + Workers Routes
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#   NEON_API_KEY          — Neon API key (PR preview branch create/delete)
#   VITE_SENTRY_DSN_FRONTEND     — Sentry DSN baked into the preview frontend bundle
#   SENTRY_AUTH_TOKEN            — Sentry auth token with release + org:read + project:releases
#   SENTRY_ORG                   — Sentry organization slug
#   SENTRY_PROJECT_FRONTEND      — Sentry project slug for the frontend
#   SENTRY_PROJECT_API           — Sentry project slug for the API Worker
#
# Required repository variables:
#   NEON_PROJECT_ID       — Neon project ID

name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches-ignore:
      - '**/graphite-base/**'

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  deployments: write

jobs:
  preview:
    name: Deploy PR preview
    if: github.event.action != 'closed'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    environment:
      name: preview/pr-${{ github.event.pull_request.number }}
      url: https://${{ github.event.pull_request.number }}-pr.boulder.best
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
      PREVIEW_ORIGIN: https://${{ github.event.pull_request.number }}-pr.boulder.best
      VITE_SENTRY_RELEASE_FRONTEND: ${{ github.event.pull_request.head.sha }}
      VITE_SENTRY_DSN_FRONTEND: ${{ secrets.VITE_SENTRY_DSN_FRONTEND }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
      SENTRY_PROJECT_API: ${{ secrets.SENTRY_PROJECT_API }}
      SENTRY_RELEASE_API: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup CI
        uses: ./.github/actions/setup-ci

      - name: Create Neon branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.PREVIEW_ALIAS }}

      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
        run: mise run api:db:migrate

      - name: Write preview secrets file
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
        run: |
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > preview.secrets.env

      - name: Upload API preview version
        env:
          PREVIEW_SECRETS_FILE: ${{ github.workspace }}/preview.secrets.env
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
        run: mise run //apps/api:preview:upload

      - name: Upload API source maps to Sentry
        run: mise run api:sentry:sourcemaps

      - name: Upload frontend preview version
        run: mise run //apps/frontend:preview:upload

  preview-cleanup:
    name: Delete PR preview resources
    if: github.event.action == 'closed'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}
