# Deploy boulder-frontend and boulder-api to Cloudflare after CI passes on main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with Workers Scripts + Workers Routes (zone boulder.best)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID (wrangler whoami)
#   DATABASE_URL          — Neon connection string for production migrations (api:db:migrate)
#
# API Worker runtime secrets (DATABASE_URL, BETTER_AUTH_SECRET, OAuth keys, etc.) are set on
# the Worker in Cloudflare, not from this workflow. Sync once locally: mise run api:secrets:sync

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup CI
        uses: ./.github/actions/setup-ci

      - name: Deploy frontend Worker
        run: mise run frontend:deploy

      - name: Apply database migrations
        run: mise run api:db:migrate

      - name: Deploy API Worker
        run: mise run api:deploy
