# Deploy boulder-frontend and boulder-api to Cloudflare after CI passes on main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with Workers Scripts + Workers Routes + R2 (zone boulder.best)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID (wrangler whoami)
#   CLOUDFLARE_ZONE_ID    — Zone ID for boulder.best (R2 custom domain / wrangler tasks)
#   DATABASE_URL          — Neon connection string for production migrations (api:db:migrate)
#   VITE_SENTRY_DSN_FRONTEND     — Sentry DSN baked into the production frontend bundle
#   SENTRY_AUTH_TOKEN            — Sentry auth token with release + org:read + project:releases
#   SENTRY_ORG                   — Sentry organization slug
#   SENTRY_PROJECT_FRONTEND      — Sentry project slug for the frontend
#   SENTRY_PROJECT_API           — Sentry project slug for the API Worker
#   SENTRY_DSN_API               — API Worker Sentry DSN (wrangler secret; not used in this workflow)
#   DISCORD_DEPLOY_WEBHOOK_URL   — Discord channel webhook URL for deploy failure alerts
#
# API Worker runtime secrets (DATABASE_URL, BETTER_AUTH_SECRET, OAuth keys, etc.) are set on
# the Worker in Cloudflare, not from this workflow. Sync once locally: mise run secrets:sync:cloudflare

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    environment:
      name: production
      url: https://boulder.best
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      VITE_SENTRY_RELEASE_FRONTEND: ${{ github.event.workflow_run.head_sha || github.sha }}
      VITE_SENTRY_DSN_FRONTEND: ${{ secrets.VITE_SENTRY_DSN_FRONTEND }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
      SENTRY_PROJECT_API: ${{ secrets.SENTRY_PROJECT_API }}
      SENTRY_RELEASE_API: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup CI
        uses: ./.github/actions/setup-ci

      - name: Deploy frontend Worker
        run: mise run frontend:deploy

      - name: Apply database migrations
        run: mise run api:db:migrate

      - name: Deploy API Worker
        run: mise run api:deploy

      - name: Sync R2 bucket (CORS and public domain)
        run: mise run api:r2:sync

      - name: Upload API source maps to Sentry
        run: mise run api:sentry:sourcemaps

  notify-failure:
    name: Notify Discord on deploy failure
    if: >-
      always() &&
      needs.deploy.result == 'failure' &&
      secrets.DISCORD_DEPLOY_WEBHOOK_URL != ''
    needs: [deploy]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      actions: read
      contents: read
    env:
      API_URL: ${{ github.api_url }}
      BRANCH_NAME: ${{ github.event.workflow_run.head_branch || github.ref_name }}
      COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      DISCORD_DEPLOY_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
      REPOSITORY: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
      SERVER_URL: ${{ github.server_url }}
      WORKFLOW_NAME: ${{ github.workflow }}
    steps:
      - name: Post deploy failure embed to Discord
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          api_url = os.environ["API_URL"]
          branch_name = os.environ["BRANCH_NAME"]
          commit_sha = os.environ["COMMIT_SHA"]
          repo = os.environ["REPOSITORY"]
          run_id = os.environ["RUN_ID"]
          server_url = os.environ["SERVER_URL"]
          token = os.environ["GITHUB_TOKEN"]
          webhook_url = os.environ["DISCORD_DEPLOY_WEBHOOK_URL"]
          workflow_name = os.environ["WORKFLOW_NAME"]

          jobs_url = f"{api_url}/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100"
          request = urllib.request.Request(
              jobs_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              jobs_data = json.load(response)

          failed_job = next(
              (job for job in jobs_data.get("jobs", []) if job.get("conclusion") == "failure"),
              None,
          )
          failed_step = "Unknown"
          if failed_job:
              step = next(
                  (
                      candidate
                      for candidate in (failed_job.get("steps") or [])
                      if candidate.get("conclusion") == "failure"
                  ),
                  None,
              )
              if step and step.get("name"):
                  failed_step = step["name"]

          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"
          commit_url = f"{server_url}/{repo}/commit/{commit_sha}"
          payload = {
              "embeds": [
                  {
                      "title": "🚨 Production deploy failed",
                      "description": f"Workflow **{workflow_name}** failed in GitHub Actions.",
                      "color": 15158332,
                      "fields": [
                          {"name": "Repository", "value": repo, "inline": True},
                          {"name": "Branch", "value": branch_name, "inline": True},
                          {
                              "name": "Commit",
                              "value": f"[`{commit_sha[:7]}`]({commit_url})",
                              "inline": True,
                          },
                          {
                              "name": "Failed job",
                              "value": failed_job["name"] if failed_job else "Unknown",
                              "inline": True,
                          },
                          {"name": "Failed step", "value": failed_step, "inline": True},
                          {"name": "Workflow", "value": workflow_name, "inline": True},
                          {"name": "Run URL", "value": run_url, "inline": False},
                      ],
                  }
              ]
          }

          webhook_request = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(webhook_request) as response:
              if response.status < 200 or response.status >= 300:
                  raise RuntimeError(f"Discord webhook failed with status {response.status}")
          PY
