# Deploy production (main) and PR previews after CI passes.
#
# Production (push to main): wrangler deploy for frontend + API.
# Pull requests: Neon branch + wrangler versions upload with preview alias pr-<n>.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with Workers Scripts + Workers Routes + R2 (zone boulder.best)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID (wrangler whoami)
#   CLOUDFLARE_ZONE_ID    — Zone ID for boulder.best (R2 custom domain / wrangler tasks)
#   DATABASE_URL          — Neon connection string for production migrations (api:db:migrate)
#   NEON_API_KEY          — Neon API key (PR preview branch create/delete)
#   VITE_SENTRY_DSN_FRONTEND     — Sentry DSN baked into the production frontend bundle
#   SENTRY_AUTH_TOKEN            — Sentry auth token with release + org:read + project:releases
#   SENTRY_ORG                   — Sentry organization slug
#   SENTRY_PROJECT_FRONTEND      — Sentry project slug for the frontend
#   SENTRY_PROJECT_API           — Sentry project slug for the API Worker
#   SENTRY_DSN_API               — API Worker Sentry DSN (wrangler secret; not used in this workflow)
#   DISCORD_DEPLOY_WEBHOOK_URL   — Discord webhook URL for deploy failure alerts
#
# Required repository variables:
#   NEON_PROJECT_ID       — Neon project ID (PR previews)
#
# API Worker runtime secrets (DATABASE_URL, BETTER_AUTH_SECRET, OAuth keys, etc.) are set on
# the Worker in Cloudflare, not from this workflow. Sync once locally: mise run secrets:sync:cloudflare

name: Deploy

on:
  pull_request:
    types: [closed]
    branches-ignore:
      - '**/graphite-base/**'
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request' &&
        format('preview-cleanup-pr-{0}', github.event.pull_request.number) ||
      github.event.workflow_run.event == 'pull_request' &&
        format('preview-pr-{0}', github.event.workflow_run.pull_requests[0].number) ||
      format('deploy-{0}', github.event.workflow_run.head_branch || github.ref_name)
    }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy to Cloudflare
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    environment:
      name: production
      url: https://boulder.best
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      VITE_SENTRY_RELEASE_FRONTEND: ${{ github.event.workflow_run.head_sha || github.sha }}
      VITE_SENTRY_DSN_FRONTEND: ${{ secrets.VITE_SENTRY_DSN_FRONTEND }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
      SENTRY_PROJECT_API: ${{ secrets.SENTRY_PROJECT_API }}
      SENTRY_RELEASE_API: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup CI
        uses: ./.github/actions/setup-ci

      - name: Deploy frontend Worker
        run: mise run frontend:deploy

      - name: Upload frontend source maps to Sentry
        run: mise run frontend:sentry:sourcemaps

      - name: Apply database migrations
        run: mise run api:db:migrate

      - name: Deploy API Worker
        run: mise run api:deploy

      - name: Sync R2 bucket (CORS and public domain)
        run: mise run api:r2:sync

      - name: Upload API source maps to Sentry
        run: mise run api:sentry:sourcemaps

      - name: Notify Discord on deploy failure
        if: failure()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCORD_DEPLOY_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [ -z "$DISCORD_DEPLOY_WEBHOOK_URL" ]; then
            echo "DISCORD_DEPLOY_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi

          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          jobs_api_url="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs?per_page=100"

          jobs_json="$(curl --silent --show-error --fail \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$jobs_api_url")"

          failed_job="$(echo "$jobs_json" | jq -r '.jobs[] | select(.conclusion == "failure") | .name' | head -n 1)"
          failed_step="$(echo "$jobs_json" | jq -r '.jobs[] | select(.conclusion == "failure") | .steps[]? | select(.conclusion == "failure") | .name' | head -n 1)"

          if [ -z "$failed_job" ]; then
            failed_job="Unknown"
          fi

          if [ -z "$failed_step" ]; then
            failed_step="Unknown"
          fi

          payload="$(
            jq -cn \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg branch "$DEPLOY_BRANCH" \
              --arg commit "$DEPLOY_SHA" \
              --arg workflow "$GITHUB_WORKFLOW" \
              --arg run_url "$run_url" \
              --arg failed_job "$failed_job" \
              --arg failed_step "$failed_step" \
              '{
                embeds: [
                  {
                    title: "🚨 Deploy workflow failed",
                    description: "Production deployment failed.",
                    color: 15548997,
                    url: $run_url,
                    fields: [
                      { name: "Repository", value: $repo, inline: true },
                      { name: "Branch", value: $branch, inline: true },
                      { name: "Commit", value: $commit, inline: false },
                      { name: "Workflow", value: $workflow, inline: true },
                      { name: "Run URL", value: $run_url, inline: false },
                      { name: "Failed Job", value: $failed_job, inline: true },
                      { name: "Failed Step", value: $failed_step, inline: true }
                    ],
                    timestamp: (now | todateiso8601)
                  }
                ]
              }'
          )"

          curl --silent --show-error --fail \
            -H "Content-Type: application/json" \
            -X POST \
            --data "$payload" \
            "$DISCORD_DEPLOY_WEBHOOK_URL"

  preview:
    name: Deploy PR preview
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      PREVIEW_ALIAS: pr-${{ github.event.workflow_run.pull_requests[0].number }}
      PREVIEW_ORIGIN: https://pr-${{ github.event.workflow_run.pull_requests[0].number }}.preview.boulder.best
      VITE_SENTRY_RELEASE_FRONTEND: ${{ github.event.workflow_run.head_sha }}
      VITE_SENTRY_DSN_FRONTEND: ${{ secrets.VITE_SENTRY_DSN_FRONTEND }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
      SENTRY_PROJECT_API: ${{ secrets.SENTRY_PROJECT_API }}
      SENTRY_RELEASE_API: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup CI
        uses: ./.github/actions/setup-ci

      - name: Create Neon branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.PREVIEW_ALIAS }}

      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
        run: mise run api:db:migrate

      - name: Write preview secrets file
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
        run: |
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > preview.secrets.env

      - name: Upload API preview version
        env:
          PREVIEW_SECRETS_FILE: ${{ github.workspace }}/preview.secrets.env
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
        run: mise run //apps/api:preview:upload

      - name: Upload API source maps to Sentry
        run: mise run api:sentry:sourcemaps

      - name: Upload frontend preview version
        run: mise run //apps/frontend:preview:upload

      - name: Comment preview URL on pull request
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PREVIEW_URL: ${{ env.PREVIEW_ORIGIN }}
        with:
          script: |
            const marker = '<!-- boulder-preview-deployment -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const previewUrl = process.env.PREVIEW_URL;
            const body = [
              marker,
              '## Preview deployment',
              '',
              `**URL:** ${previewUrl}`,
              '',
              'Same-origin `/api` routing via the preview gateway. Email/password and passkeys use `PASSKEY_RP_ID=boulder.best`.',
              '',
              '_OAuth redirect URIs are not configured for preview hosts._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  preview-cleanup:
    name: Delete PR preview resources
    if: github.event_name == 'pull_request'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}
