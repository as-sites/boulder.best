# Discord alert when a pull request is merged into main.
#
# Required repository secret:
#   DISCORD_PR_MERGE_WEBHOOK_URL — Discord webhook URL for PR merge alerts

name: PR merged

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Notify Discord on PR merge
    if: github.event.pull_request.merged == true
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Notify Discord
        env:
          DISCORD_PR_MERGE_WEBHOOK_URL: ${{ secrets.DISCORD_PR_MERGE_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login || 'unknown' }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [ -z "$DISCORD_PR_MERGE_WEBHOOK_URL" ]; then
            echo "DISCORD_PR_MERGE_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi

          payload="$(
            jq -cn \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg number "$PR_NUMBER" \
              --arg title "$PR_TITLE" \
              --arg url "$PR_URL" \
              --arg author "$PR_AUTHOR" \
              --arg merged_by "$MERGED_BY" \
              --arg base "$BASE_BRANCH" \
              --arg head "$HEAD_BRANCH" \
              --arg commit "$MERGE_COMMIT" \
              '{
                embeds: [
                  {
                    title: ("✅ PR #" + $number + " merged"),
                    description: $title,
                    color: 5763719,
                    url: $url,
                    fields: [
                      { name: "Repository", value: $repo, inline: true },
                      { name: "Author", value: ("@" + $author), inline: true },
                      { name: "Merged by", value: ("@" + $merged_by), inline: true },
                      { name: "Branches", value: ($head + " → " + $base), inline: false },
                      { name: "Merge commit", value: $commit, inline: false },
                      { name: "Pull request", value: $url, inline: false }
                    ],
                    timestamp: (now | todateiso8601)
                  }
                ]
              }'
          )"

          curl --silent --show-error --fail \
            -H "Content-Type: application/json" \
            -X POST \
            --data "$payload" \
            "$DISCORD_PR_MERGE_WEBHOOK_URL"
